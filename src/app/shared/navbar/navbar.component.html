<header>
  <nav class="nav-container">
    <div style="display: flex; align-items: center; gap: 2rem;">
      <a routerLink="/" class="brand-logo">MindMirror</a>
      <div class="nav-links">
        <a routerLink="/" routerLinkActive="active" class="nav-link" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
        <a routerLink="/posts/all" routerLinkActive="active" class="nav-link">Posts</a>
        <a routerLink="/subscribe" routerLinkActive="active" class="nav-link">Newsletter</a>
        @if (authService.isLoggedIn()) {
          <a routerLink="/drafts" routerLinkActive="active" class="nav-link">Borradores</a>
          <a routerLink="/profile" routerLinkActive="active" class="nav-link">Mi Perfil</a>
          @if (authService.isAdmin()) {
            <a routerLink="/admin/subscribers" routerLinkActive="active" class="nav-link">Suscriptores</a>
          }
        }
      </div>
    </div>

    <div class="nav-actions">
      <button type="button" class="theme-toggle" (click)="themeService.toggle()" [attr.aria-label]="themeService.isDarkMode() ? 'Activar modo claro' : 'Activar modo oscuro'">
        @if (themeService.isDarkMode()) {
          <span class="material-symbols-outlined" style="font-size: 18px;">light_mode</span>
        } @else {
          <span class="material-symbols-outlined" style="font-size: 18px;">dark_mode</span>
        }
      </button>
      @if (authService.isLoggedIn()) {
        <button type="button" class="btn btn-secondary btn-sm" (click)="logout()">
          <span class="material-symbols-outlined" style="font-size: 18px;">logout</span>
          Cerrar sesión
        </button>
      } @else {
        <a routerLink="/login" class="nav-link" style="margin-right: 0.5rem;">Iniciar sesión</a>
        <a routerLink="/subscribe" class="btn btn-primary">Suscribirse</a>
      }
    </div>
  </nav>
</header>
