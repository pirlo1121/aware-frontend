<header>
  <nav class="nav-container">
    <div class="nav-left">
      <a routerLink="/drafts" class="brand-logo" (click)="closeMobileMenu()">MindMirror</a>

      <div class="nav-links" [class.is-open]="mobileMenuOpen()">
        @if (authService.isLoggedIn()) {
          <a routerLink="/drafts" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">Borradores</a>
          <a routerLink="/profile" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">Mi Perfil</a>
          @if (authService.isAdmin()) {
            <a routerLink="/admin/subscribers" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">Suscriptores</a>
          }
          <div class="nav-links-mobile-actions">
            <button type="button" class="btn btn-secondary btn-sm" style="width: 100%;" (click)="logout(); closeMobileMenu()">
              <span class="material-symbols-outlined" style="font-size: 18px;">logout</span>
              Cerrar sesión
            </button>
          </div>
        }
      </div>
    </div>

    <div class="nav-actions">
      <button type="button" class="theme-toggle" (click)="themeService.toggle()" [attr.aria-label]="themeService.isDarkMode() ? 'Activar modo claro' : 'Activar modo oscuro'">
        @if (themeService.isDarkMode()) {
          <span class="material-symbols-outlined" style="font-size: 18px;">light_mode</span>
        } @else {
          <span class="material-symbols-outlined" style="font-size: 18px;">dark_mode</span>
        }
      </button>
      <button type="button" class="mobile-menu-toggle" (click)="toggleMobileMenu()" aria-label="Menú de navegación">
        @if (mobileMenuOpen()) {
          <span class="material-symbols-outlined">close</span>
        } @else {
          <span class="material-symbols-outlined">menu</span>
        }
      </button>
      @if (authService.isLoggedIn()) {
        <button type="button" class="btn btn-secondary btn-sm nav-desktop-only" (click)="logout()">
          <span class="material-symbols-outlined" style="font-size: 18px;">logout</span>
          Cerrar sesión
        </button>
      }
    </div>
  </nav>
</header>
